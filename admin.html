<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理者用画面</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-app">
      <section class="admin-panel" id="dashboard">
        <header class="admin-head">
          <div>
            <p class="eyebrow">ADMIN CONSOLE</p>
            <h1 id="projectName">管理者用画面</h1>
          </div>
          <div class="admin-actions">
            <button class="ghost-button" id="refreshButton" type="button">更新</button>
            <button class="ghost-button" id="logoutButton" type="button">ログアウト</button>
            <button class="reveal-button" id="startRevealButton" type="button" disabled>結果発表</button>
          </div>
        </header>

        <div class="status-summary">
          <div>
            <span>提出状況</span>
            <strong id="submitCount">0 / 0</strong>
          </div>
          <div>
            <span>状態</span>
            <strong id="readyState">確認中</strong>
          </div>
        </div>

        <section class="judge-status-section">
          <div class="section-title">
            <p class="eyebrow">SUBMISSIONS</p>
            <h2>各採点者の提出状況</h2>
          </div>
          <div class="judge-status-grid" id="judgeStatusGrid"></div>
        </section>

        <section class="result-preview-section">
          <div class="section-title">
            <p class="eyebrow">RESULT PREVIEW</p>
            <h2>提出済みデータの暫定集計</h2>
          </div>
          <div class="preview-list" id="previewList"></div>
        </section>
      </section>

      <section class="reveal-stage hidden" id="revealStage">
        <button class="ghost-button back-button" id="backButton" type="button">管理画面へ戻る</button>
        <div class="reveal-screen">
          <p class="eyebrow">FINAL RESULT</p>
          <div class="reveal-team" id="revealTeam">READY</div>
          <div class="reveal-score" id="revealScore">---</div>
          <div class="reveal-sub" id="revealSub">結果発表</div>
          <div class="reveal-ranking" id="revealRanking"></div>
        </div>
      </section>

      <div class="toast hidden" id="messageBox"></div>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
